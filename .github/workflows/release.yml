name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        distro: [humble, jazzy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build ROS2 ${{ matrix.distro }}
        run: ./scripts/docker_build.sh ${{ matrix.distro }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ros2-${{ matrix.distro }}-x86_64
          path: output/${{ matrix.distro }}/ros2-${{ matrix.distro }}-x86_64.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
